name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Archive binary
        shell: bash
        run: |
          BINARY="liana"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BINARY="liana.exe"
          fi

          ARCHIVE_NAME="liana-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "$ARCHIVE_NAME" ./target/${{ matrix.target }}/release/$BINARY
          else
            tar czf "$ARCHIVE_NAME" -C ./target/${{ matrix.target }}/release $BINARY
          done

          echo "archive=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liana-${{ matrix.target }}
          path: ${{ env.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        shell: bash
        run: |
          # Flatten the artifact directories into a single list of archives
          mkdir -p release_artifacts
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release_artifacts/ \;
          echo "artifacts:" && ls -la release_artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_artifacts/*
          generate_release_notes: true
